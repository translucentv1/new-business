<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Root-Cause Debugger — Cover</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .card {
    width: 1000px; height: 1000px; background: #ffffff;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; position: relative;
  }
  .badge {
    position: absolute; top: 40px; right: 40px;
    background: #d97757; color: #fff; font-weight: 700; font-size: 22px;
    padding: 8px 16px; border-radius: 999px; letter-spacing: .5px;
  }
  .split { display: flex; gap: 20px; }
  .pane { width: 360px; height: 300px; border-radius: 14px; padding: 22px; box-shadow: 0 16px 40px rgba(0,0,0,.12); }
  .sym { background: #fff1f0; border: 1px solid #ffccc7; }
  .root { background: #f0f7ff; border: 1px solid #adc6ff; }
  .t { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
  .sym .t { color: #cf1322; }
  .root .t { color: #1d39c4; }
  .code { font-family: "SF Mono", Consolas, monospace; font-size: 19px; color: #0d1117; line-height: 1.5; }
  .mag { color: #d97757; font-weight: 700; }
  .h1 { font-size: 40px; font-weight: 800; color: #0d1117; margin-top: 6px; }
  .sub { font-size: 21px; color: #57606a; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Claude Skill</div>
    <div class="split">
      <div class="pane sym">
        <div class="t">SYMPTOM</div>
        <div class="code">KeyError: 'timeout'<br>app.py:42<br>crash on startup</div>
      </div>
      <div class="pane root">
        <div class="t">ROOT CAUSE</div>
        <div class="code"><span class="mag">🔍</span> cfg["timeout"] missing<br>from loaded config —<br>no default provided</div>
      </div>
    </div>
    <div class="h1">Root-Cause Debugger</div>
    <div class="sub">Stop guessing. Find the bug — with evidence.</div>
  </div>
</body>
</html>
