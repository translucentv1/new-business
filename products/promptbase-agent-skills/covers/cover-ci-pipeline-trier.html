<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CI/CD Failure Trier — Cover</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .card {
    width: 1000px; height: 1000px; background: #ffffff;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; position: relative;
  }
  .badge {
    position: absolute; top: 40px; right: 40px;
    background: #d97757; color: #fff; font-weight: 700; font-size: 22px;
    padding: 8px 16px; border-radius: 999px; letter-spacing: .5px;
  }
  .log {
    width: 740px; background: #0d1117; border-radius: 14px; padding: 22px 26px;
    font-family: "SF Mono", Consolas, monospace; font-size: 21px; line-height: 1.6; color: #c9d1d9;
    box-shadow: 0 20px 50px rgba(0,0,0,.18); border: 1px solid #30363d;
  }
  .red { color: #f85149; font-weight: 700; }
  .mut { color: #8b949e; }
  .fix {
    width: 740px; background: #eafaf0; border-left: 6px solid #27c93f; border-radius: 10px;
    padding: 18px 22px; font-size: 21px; color: #0d1117;
  }
  .fix b { color: #1a7f37; }
  .h1 { font-size: 40px; font-weight: 800; color: #0d1117; margin-top: 6px; }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">Claude Skill</div>
    <div class="log">
      <span class="mut">Run pytest</span><br>
      <span class="red">FIRST RED — tests/test_api.py:2 assert 500 == 200</span><br>
      <span class="mut">... 200 lines of cascade ...</span>
    </div>
    <div class="fix">
      <b>FIX:</b> mock downstream so it returns 200, or fix the handler that
      throws 500. Then add a contract test to fail fast.
    </div>
    <div class="h1">CI/CD Failure Trier</div>
  </div>
</body>
</html>
